events {}

http {
    upstream service1 {
        server nodejs-server-about:3002;
        
    }

    upstream service2 {
        server nodejs-server-profiles:3001;
    }

    server {
        listen 80;
        
        location /service1/ {
            proxy_pass http://service1/;
        }

        location /service2/ {
            proxy_pass http://service2/;
        }
    }
}